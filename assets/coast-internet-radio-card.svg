<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title description">
  <title id="title">Coast Internet Radio project card</title>
  <desc id="description">A wide editorial graphic showing a live radio player, secure stream relay and owner-managed content.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f0e3"/>
      <stop offset="1" stop-color="#e8dcc7"/>
    </linearGradient>
    <linearGradient id="player" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172630"/>
      <stop offset="1" stop-color="#263d45"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="40" fill="url(#background)"/>
  <circle cx="1095" cy="80" r="190" fill="#d6a14c" opacity=".14"/>
  <circle cx="1080" cy="680" r="260" fill="#4d9693" opacity=".12"/>
  <g transform="translate(72 70)">
    <rect width="232" height="42" rx="21" fill="#6c5b36"/>
    <text x="116" y="28" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="17" font-weight="700" letter-spacing="1.4">LIVE STAKEHOLDER</text>
    <text x="0" y="128" fill="#202b31" font-family="Georgia,serif" font-size="64" font-weight="700">Coast Internet</text>
    <text x="0" y="196" fill="#202b31" font-family="Georgia,serif" font-size="64" font-weight="700">Radio</text>
    <text x="0" y="245" fill="#58656a" font-family="Arial,sans-serif" font-size="25">A reliable listening experience for real users.</text>
    <g transform="translate(0 310)" font-family="Arial,sans-serif">
      <text x="0" y="0" fill="#6c5b36" font-size="16" font-weight="700" letter-spacing="1.5">BUILT AROUND</text>
      <g transform="translate(0 30)">
        <circle cx="12" cy="12" r="11" fill="#4d9693"/>
        <path d="m7 12 4 4 7-9" fill="none" stroke="#fff" stroke-width="3"/>
        <text x="38" y="18" fill="#28353a" font-size="20" font-weight="700">HTTPS stream relays</text>
      </g>
      <g transform="translate(0 86)">
        <circle cx="12" cy="12" r="11" fill="#4d9693"/>
        <path d="m7 12 4 4 7-9" fill="none" stroke="#fff" stroke-width="3"/>
        <text x="38" y="18" fill="#28353a" font-size="20" font-weight="700">Protected owner tools</text>
      </g>
      <g transform="translate(0 142)">
        <circle cx="12" cy="12" r="11" fill="#4d9693"/>
        <path d="m7 12 4 4 7-9" fill="none" stroke="#fff" stroke-width="3"/>
        <text x="38" y="18" fill="#28353a" font-size="20" font-weight="700">First-party listener evidence</text>
      </g>
    </g>
  </g>
  <g transform="translate(610 92)">
    <rect width="520" height="500" rx="30" fill="url(#player)" stroke="#4a6268" stroke-width="3"/>
    <g transform="translate(30 28)" font-family="Arial,sans-serif">
      <rect width="94" height="30" rx="15" fill="#d74e44"/>
      <circle cx="18" cy="15" r="5" fill="#fff"/>
      <text x="56" y="21" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" letter-spacing="1">ON AIR</text>
      <text x="460" y="21" text-anchor="end" fill="#a8bdc1" font-size="15">COAST INTERNET RADIO</text>
      <text x="0" y="100" fill="#f6f0e3" font-family="Georgia,serif" font-size="34" font-weight="700">Now playing</text>
      <text x="0" y="143" fill="#8ed4d1" font-size="22" font-weight="700">Live from Newry</text>
      <text x="0" y="176" fill="#a8bdc1" font-size="17">Secure audio and metadata relay</text>
      <g transform="translate(0 215)" fill="#d6a14c">
        <rect x="0" y="34" width="8" height="32" rx="4"/>
        <rect x="18" y="12" width="8" height="76" rx="4"/>
        <rect x="36" y="25" width="8" height="50" rx="4"/>
        <rect x="54" y="0" width="8" height="100" rx="4"/>
        <rect x="72" y="18" width="8" height="64" rx="4"/>
        <rect x="90" y="31" width="8" height="38" rx="4"/>
        <rect x="108" y="8" width="8" height="84" rx="4"/>
        <rect x="126" y="22" width="8" height="56" rx="4"/>
        <rect x="144" y="38" width="8" height="24" rx="4"/>
        <rect x="162" y="16" width="8" height="68" rx="4"/>
        <rect x="180" y="28" width="8" height="44" rx="4"/>
        <rect x="198" y="6" width="8" height="88" rx="4"/>
        <rect x="216" y="23" width="8" height="54" rx="4"/>
        <rect x="234" y="36" width="8" height="28" rx="4"/>
        <rect x="252" y="18" width="8" height="64" rx="4"/>
      </g>
      <g transform="translate(0 345)">
        <circle cx="46" cy="46" r="46" fill="#4d9693"/>
        <path d="m38 28 28 18-28 18Z" fill="#fff"/>
        <rect x="118" y="10" width="342" height="72" rx="14" fill="#20343b" stroke="#4a6268" stroke-width="2"/>
        <text x="140" y="38" fill="#f6f0e3" font-size="16" font-weight="700">Owner-managed station updates</text>
        <text x="140" y="62" fill="#9cb1b5" font-size="15">Signed sessions + deployment safeguards</text>
      </g>
    </g>
  </g>
</svg>
