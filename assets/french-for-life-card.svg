<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title description">
  <title id="title">French for Life project card</title>
  <desc id="description">A coral, cream and dark green graphic describing the teach-before-test French learning platform.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ec"/>
      <stop offset="1" stop-color="#f2e8d8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="42" fill="url(#background)"/>
  <circle cx="1065" cy="115" r="170" fill="#e7644a" opacity=".14"/>
  <circle cx="1090" cy="650" r="250" fill="#2f6d58" opacity=".1"/>
  <g transform="translate(82 78)">
    <rect width="218" height="44" rx="22" fill="#2f6d58"/>
    <text x="109" y="29" fill="#fff" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="1.5">LIVE WEB APP</text>
    <text x="0" y="128" fill="#1f2925" font-family="Arial, sans-serif" font-size="72" font-weight="800">French for Life</text>
    <text x="0" y="184" fill="#4d5b55" font-family="Arial, sans-serif" font-size="29">Useful French, taught before it is tested.</text>
    <g transform="translate(0 245)">
      <rect width="710" height="220" rx="28" fill="#fff" stroke="#d9cdbd" stroke-width="3"/>
      <text x="38" y="55" fill="#e05a42" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.8">LEARN THIS FIRST</text>
      <text x="38" y="112" fill="#1f2925" font-family="Arial, sans-serif" font-size="38" font-weight="800">Je m'appelle Jamie.</text>
      <text x="38" y="156" fill="#4d5b55" font-family="Arial, sans-serif" font-size="24">“My name is Jamie.”</text>
      <rect x="38" y="178" width="204" height="10" rx="5" fill="#e7644a"/>
      <rect x="254" y="178" width="150" height="10" rx="5" fill="#2f6d58" opacity=".35"/>
    </g>
    <g transform="translate(760 244)">
      <text x="0" y="24" fill="#1f2925" font-family="Arial, sans-serif" font-size="22" font-weight="700">Built with</text>
      <text x="0" y="66" fill="#4d5b55" font-family="Arial, sans-serif" font-size="21">Next.js + TypeScript</text>
      <text x="0" y="102" fill="#4d5b55" font-family="Arial, sans-serif" font-size="21">Supabase persistence</text>
      <text x="0" y="138" fill="#4d5b55" font-family="Arial, sans-serif" font-size="21">Curriculum verification</text>
      <text x="0" y="174" fill="#4d5b55" font-family="Arial, sans-serif" font-size="21">Accessible learning flows</text>
    </g>
    <text x="0" y="550" fill="#2f6d58" font-family="Arial, sans-serif" font-size="22" font-weight="700">French learning with an evidence-first product design.</text>
  </g>
</svg>
