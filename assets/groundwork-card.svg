<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title description"><title id="title">Groundwork project card</title><desc id="description">A guided learning dashboard with a recommended next step,SQL result table and personal guidebook.</desc><defs><linearGradient id="paper" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7f3e9"/><stop offset="1" stop-color="#e8e1d2"/></linearGradient><linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f7f5ef"/></linearGradient></defs><rect width="1200" height="720" rx="38" fill="url(#paper)"/><circle cx="1080" cy="95" r="180" fill="#2d6d5b" opacity=".09"/><circle cx="1050" cy="675" r="250" fill="#c66f3f" opacity=".08"/><g transform="translate(70 68)"><rect width="156" height="40" rx="20" fill="#264f46"/><text x="78" y="27" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="17" font-weight="700" letter-spacing="1.5">LOCAL APP</text><text x="0" y="125" fill="#21332e" font-family="Georgia,serif" font-size="72" font-weight="700">Groundwork</text><text x="0" y="180" fill="#52645e" font-family="Arial,sans-serif" font-size="25">A tested path back into computing.</text><g transform="translate(0 245)"><rect width="470" height="330" rx="24" fill="url(#panel)" stroke="#b9b2a4" stroke-width="3"/><text x="30" y="42" fill="#8a4b2d" font-family="Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">RECOMMENDED NEXT</text><text x="30" y="88" fill="#21332e" font-family="Georgia,serif" font-size="31" font-weight="700">Continue Guided SQL</text><text x="30" y="124" fill="#66746f" font-family="Arial,sans-serif" font-size="18">Stage 8 of 15 · GROUP BY</text><rect x="30" y="150" width="410" height="12" rx="6" fill="#d8d2c7"/><rect x="30" y="150" width="218" height="12" rx="6" fill="#2d6d5b"/><text x="30" y="208" fill="#21332e" font-family="Arial,sans-serif" font-size="18" font-weight="700">Why this now</text><text x="30" y="238" fill="#66746f" font-family="Arial,sans-serif" font-size="17">The prerequisite lesson is complete and</text><text x="30" y="265" fill="#66746f" font-family="Arial,sans-serif" font-size="17">your last two attempts show this is ready.</text><rect x="30" y="288" width="190" height="42" rx="8" fill="#21332e"/><text x="125" y="315" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="16" font-weight="700">Continue learning</text></g></g><g transform="translate(610 92)"><rect width="520" height="250" rx="24" fill="#12211d"/><text x="28" y="38" fill="#8ee4c8" font-family="Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">REAL SQLITE</text><text x="28" y="78" fill="#f2f5f1" font-family="ui-monospace,monospace" font-size="20">SELECT module,COUNT(*)</text><text x="28" y="110" fill="#f2f5f1" font-family="ui-monospace,monospace" font-size="20">FROM sessions</text><text x="28" y="142" fill="#f2f5f1" font-family="ui-monospace,monospace" font-size="20">GROUP BY module;</text><g transform="translate(28 170)" font-family="Arial,sans-serif" font-size="15"><rect width="464" height="52" rx="8" fill="#203730"/><text x="18" y="21" fill="#8ee4c8" font-weight="700">module</text><text x="300" y="21" fill="#8ee4c8" font-weight="700">COUNT</text><text x="18" y="43" fill="#e6eee9">Databases</text><text x="300" y="43" fill="#e6eee9">12</text></g></g><g transform="translate(610 378)"><rect width="520" height="242" rx="24" fill="url(#panel)" stroke="#b9b2a4" stroke-width="3"/><text x="28" y="42" fill="#8a4b2d" font-family="Arial,sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">MY GUIDEBOOK</text><text x="28" y="83" fill="#21332e" font-family="Georgia,serif" font-size="27" font-weight="700">Evidence becomes a reference.</text><g transform="translate(28 112)" font-family="Arial,sans-serif"><circle cx="10" cy="10" r="8" fill="#2d6d5b"/><path d="m6 10 3 3 6-7" fill="none" stroke="#fff" stroke-width="2"/><text x="32" y="16" fill="#53635d" font-size="17">Learned in a full lesson</text><circle cx="10" cy="54" r="8" fill="#2d6d5b"/><path d="m6 54 3 3 6-7" fill="none" stroke="#fff" stroke-width="2"/><text x="32" y="60" fill="#53635d" font-size="17">Practised successfully</text><circle cx="10" cy="98" r="8" fill="#2d6d5b"/><path d="m6 98 3 3 6-7" fill="none" stroke="#fff" stroke-width="2"/><text x="32" y="104" fill="#53635d" font-size="17">Used in portfolio work</text></g></g></svg>