name: Apply portfolio refresh

on:
  push:
    branches:
      - portfolio-flagship-projects
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.message != 'Reframe portfolio around flagship projects'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Build refreshed portfolio files
        shell: bash
        run: |
          set -euo pipefail

          cat \
            .portfolio-refresh/index.00 \
            .portfolio-refresh/index.01 \
            .portfolio-refresh/index.02 \
            .portfolio-refresh/index.03 \
            .portfolio-refresh/index.04 > index.html

          base64 --decode .portfolio-refresh/index.05.b64 >> index.html
          base64 --decode .portfolio-refresh/index.06.b64 >> index.html
          base64 --decode .portfolio-refresh/index.07.b64 >> index.html

          base64 --decode .portfolio-refresh/project-showcase.css.b64 > project-showcase.css
          mkdir -p assets
          base64 --decode .portfolio-refresh/the-world-forgot-us-card.svg.b64 > assets/the-world-forgot-us-card.svg
          base64 --decode .portfolio-refresh/groundwork-card.svg.b64 > assets/groundwork-card.svg

          rm -rf .portfolio-refresh

      - name: Validate site
        run: npm test

      - name: Commit generated files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Reframe portfolio around flagship projects" || exit 0
          git push
