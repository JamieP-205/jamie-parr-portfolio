[build]
  command = "npm test"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'none'; script-src 'self'; script-src-attr 'none'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.github.com https://coast-metadata.jamieparr05.workers.dev; media-src 'none'; frame-src 'none'; worker-src 'none'; manifest-src 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/case-study.html"
  to = "/coast-internet-radio-case-study.html"
  status = 301
  force = true

[[redirects]]
  from = "/case-study"
  to = "/coast-internet-radio-case-study.html"
  status = 301

[[redirects]]
  from = "/coast-internet-radio-case-study"
  to = "/coast-internet-radio-case-study.html"
  status = 200

[[redirects]]
  from = "/local-web-fix-case-study"
  to = "/local-web-fix-case-study.html"
  status = 200

[[redirects]]
  from = "/talk-with-jamie-case-study"
  to = "/talk-with-jamie-case-study.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
