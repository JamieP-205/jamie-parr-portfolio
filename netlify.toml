[build]
  command = "npm test"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/case-study.html"
  to = "/coast-internet-radio-case-study.html"
  status = 301
  force = true

[[redirects]]
  from = "/case-study"
  to = "/coast-internet-radio-case-study.html"
  status = 301

[[redirects]]
  from = "/coast-internet-radio-case-study"
  to = "/coast-internet-radio-case-study.html"
  status = 200

[[redirects]]
  from = "/local-web-fix-case-study"
  to = "/local-web-fix-case-study.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
